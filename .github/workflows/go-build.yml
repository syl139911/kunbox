name: Go Core Build (libbox.aar)

on:
  workflow_dispatch:
    inputs:
      sing_box_tag:
        description: 'sing-box upstream tag (e.g. v1.13.11)'
        required: false
        default: 'v1.13.11'

permissions:
  contents: write

jobs:
  build-libbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;29.0.13113456"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.13113456" >> $GITHUB_ENV

      - name: Install gomobile & gobind
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Clone sing-box upstream
        run: |
          TAG="${{ github.event.inputs.sing_box_tag || 'v1.13.11' }}"
          echo "Target sing-box tag: $TAG"
          git clone --branch "$TAG" --depth 1 \
            https://github.com/SagerNet/sing-box.git upstream-sing-box

      - name: Apply KunBox Go patches (01 & 02)
        working-directory: upstream-sing-box
        run: |
          echo "=== Applying patch 01: option/simple.go ==="
          git apply --check ../patches/01-option-simple-go.patch && \
            git apply ../patches/01-option-simple-go.patch
          echo "=== Applying patch 02: protocol/http/outbound.go ==="
          git apply --check ../patches/02-outbound-go.patch && \
            git apply ../patches/02-outbound-go.patch
          echo "=== Patches 01 & 02 applied ==="

      - name: Vendor dependencies & patch sing client.go
        working-directory: upstream-sing-box
        run: |
          # Vendor dependencies so we can patch them locally
          go mod vendor

          # Find sing client.go in vendor
          CLIENT_GO="vendor/github.com/sagernet/sing/protocol/http/client.go"
          echo "Patching: $CLIENT_GO"

          if [ ! -f "$CLIENT_GO" ]; then
            echo "ERROR: $CLIENT_GO not found!"
            echo "Looking for sing http files:"
            find vendor/github.com/sagernet/sing -name "*.go" -path "*/http/*" 2>/dev/null || true
            exit 1
          fi

          echo "=== Before patch ==="
          head -80 "$CLIENT_GO"

          # 3a: Add delHost field to Client struct
          # Find line with 'host    string' and add delHost after it
          sed -i '/^\thost.*string$/a\\tdelHost    bool' "$CLIENT_GO"

          # 3b: Add DelHost field to Options struct
          sed -i '/^\tHost.*string$/a\\tDelHost  bool' "$CLIENT_GO"

          # 3c: Add delHost assignment in NewClient
          sed -i '/^\thost:.*options\.Host,$/a\\t\tdelHost:    options.DelHost,' "$CLIENT_GO"

          # 3d: Add delHost branch in DialContext before existing host check
          # Match the exact line: if c.host != "" && c.host != destination.Fqdn {
          sed -i 's/^\tif c\.host != "" && c\.host != destination\.Fqdn {$/\tif c.delHost {\n\t\trequest.URL = \&url.URL{Opaque: target}\n\t\trequest.Host = ""\n\t} else if c.host != "" \&\& c.host != destination.Fqdn {/' "$CLIENT_GO"

          echo "=== After patch ==="
          head -100 "$CLIENT_GO"
          echo "=== Patch applied successfully ==="

      - name: Build libbox.aar
        run: |
          cd upstream-sing-box
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_NDK_HOME

          echo "=== Building libbox.aar with gomobile ==="
          gomobile bind -v -androidapi 24 -javapkg=com.github.sagernet \
            -trimpath -ldflags='-s -w' \
            -o ../app/libs/libbox.aar \
            ./experimental/libbox

          cd ..
          echo "=== libbox.aar built ==="
          ls -lh app/libs/libbox.aar

      - name: Verify libbox.aar exports
        run: |
          echo "Checking exported symbols..."
          SIZE=$(stat -c%s app/libs/libbox.aar)
          echo "libbox.aar size: $SIZE bytes"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "WARNING: libbox.aar seems too small (< 10MB), build may have failed"
            exit 1
          fi
          echo "OK: libbox.aar looks reasonable"

      - name: Upload libbox.aar artifact
        uses: actions/upload-artifact@v4
        with:
          name: libbox-aar
          path: app/libs/libbox.aar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize gradlew
        run: |
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew

      - name: Build Debug APK (arm64-v8a)
        run: |
          mkdir -p dist
          ./gradlew assembleDebug -PabiOnly=arm64-v8a
          find app/build/outputs/apk/debug -type f -name "*.apk" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kunbox-go-debug-apk
          path: dist/*.apk
