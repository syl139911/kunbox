name: Go Core Build (libbox.aar)

on:
  workflow_dispatch:
    inputs:
      sing_box_tag:
        description: 'sing-box upstream tag (e.g. v1.13.11)'
        required: false
        default: 'v1.13.11'

permissions:
  contents: write

jobs:
  build-libbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.7'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;29.0.13113456"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.13113456" >> $GITHUB_ENV

      - name: Install gomobile & gobind (sagernet fork)
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.12
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.12
          gomobile init
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Clone sing-box upstream
        run: |
          TAG="${{ github.event.inputs.sing_box_tag || 'v1.13.11' }}"
          echo "Target sing-box tag: $TAG"
          git clone --branch "$TAG" --depth 1 \
            https://github.com/SagerNet/sing-box.git upstream-sing-box

      - name: Inject KunBox custom libbox methods
        working-directory: upstream-sing-box
        run: |
          cat > experimental/libbox/kunbox_custom.go << 'GOEOF'
          package libbox

          import (
          	"sync"
          	"sync/atomic"
          )

          // --- KunBox custom extensions ---

          var kunBoxVersion = "1.0.0-kunbox"

          // SetKunBoxVersion sets the version string returned by GetKunBoxVersion.
          func SetKunBoxVersion(v string) { kunBoxVersion = v }

          // GetKunBoxVersion returns the KunBox extension version.
          func GetKunBoxVersion() string { return kunBoxVersion }

          var connectionCount atomic.Int64

          // IncrConnectionCount increments the active connection counter.
          func IncrConnectionCount() { connectionCount.Add(1) }

          // DecrConnectionCount decrements the active connection counter.
          func DecrConnectionCount() { connectionCount.Add(-1) }

          // GetConnectionCount returns the current active connection count.
          func GetConnectionCount() int32 { return int32(connectionCount.Load()) }

          var resetAllConnsFunc func(system bool)

          // RegisterResetAllConnections registers the callback for reset.
          func RegisterResetAllConnections(fn func(system bool)) { resetAllConnsFunc = fn }

          // ResetAllConnections resets all connections.
          func ResetAllConnections(system bool) {
          	if resetAllConnsFunc != nil {
          		resetAllConnsFunc(system)
          	}
          }

          var closeAllTrackedFunc func() int32

          // RegisterCloseAllTrackedConnections registers the callback.
          func RegisterCloseAllTrackedConnections(fn func() int32) { closeAllTrackedFunc = fn }

          // CloseAllTrackedConnections closes all tracked connections and returns count.
          func CloseAllTrackedConnections() int32 {
          	if closeAllTrackedFunc != nil {
          		return closeAllTrackedFunc()
          	}
          	return 0
          }

          var recoverNetworkAutoFunc func() bool

          // RegisterRecoverNetworkAuto registers the callback.
          func RegisterRecoverNetworkAuto(fn func() bool) { recoverNetworkAutoFunc = fn }

          // RecoverNetworkAuto attempts automatic network recovery.
          func RecoverNetworkAuto() bool {
          	if recoverNetworkAutoFunc != nil {
          		return recoverNetworkAutoFunc()
          	}
          	return false
          }

          var checkNetworkRecoveryFunc func() bool

          // RegisterCheckNetworkRecoveryNeeded registers the callback.
          func RegisterCheckNetworkRecoveryNeeded(fn func() bool) { checkNetworkRecoveryFunc = fn }

          // CheckNetworkRecoveryNeeded checks if network recovery is needed.
          func CheckNetworkRecoveryNeeded() bool {
          	if checkNetworkRecoveryFunc != nil {
          		return checkNetworkRecoveryFunc()
          	}
          	return false
          }

          // Ensure sync import is used
          var _ sync.Once
          GOEOF
          echo "=== KunBox custom libbox methods injected ==="
          cat experimental/libbox/kunbox_custom.go
      - name: Apply KunBox Go patches (01 & 02)
        working-directory: upstream-sing-box
        run: |
          echo "=== Patch 1: option/simple.go - add DelHost to HTTPOutboundOptions ==="
          sed -i '/Headers badoption.HTTPHeader/a\	DelHost bool                 `json:"del_host,omitempty"`' option/simple.go
          grep -n 'DelHost' option/simple.go

          echo "=== Patch 2: protocol/http/outbound.go - pass DelHost to HTTP client ==="
          sed -i '/Headers:.*options\.Headers\.Build(),/a\				DelHost:  options.DelHost,' protocol/http/outbound.go
          grep -n 'DelHost' protocol/http/outbound.go

          echo "=== Patches 01 & 02 applied ==="

      - name: Patch sing dependency via replace directive
        working-directory: upstream-sing-box
        run: |
          # Get the sing version from go.mod
          SING_VERSION=$(grep 'github.com/sagernet/sing ' go.mod | awk '{print $2}')
          echo "sing version: $SING_VERSION"

          # Download the sing module to cache
          go mod download github.com/sagernet/sing@${SING_VERSION}

          # Find the cached module
          SING_CACHE="$(go env GOMODCACHE)/github.com/sagernet/sing@${SING_VERSION}"
          echo "sing cache path: $SING_CACHE"

          # Copy sing to a local directory for patching
          cp -r "$SING_CACHE" ../local-sing
          chmod -R u+w ../local-sing

          # Patch client.go
          CLIENT_GO="../local-sing/protocol/http/client.go"
          echo "Patching: $CLIENT_GO"

          if [ ! -f "$CLIENT_GO" ]; then
            echo "ERROR: $CLIENT_GO not found!"
            find ../local-sing -name "client.go" -path "*/http/*"
            exit 1
          fi

          echo "=== Before patch ==="
          grep -n 'host\|Host\|delHost\|Fqdn' "$CLIENT_GO" || true

          # --- Fix: match actual sing v0.8.9 struct fields ---

          # 3a: Add delHost field to Client struct (after 'host       string')
          sed -i '/^\thost.*string$/a\	delHost    bool' "$CLIENT_GO"

          # 3b: Add DelHost field to Options struct (after 'Headers  http.Header')
          sed -i '/^\tHeaders.*http\.Header$/a\	DelHost  bool' "$CLIENT_GO"

          # 3c: Add delHost assignment in NewClient (after 'headers:    options.Headers,')
          sed -i '/^\theaders:.*options\.Headers,$/a\			delHost:    options.DelHost,' "$CLIENT_GO"

          # 3d: Add delHost Opaque URL branch BEFORE existing host check
          python3 -c "
          import re
          with open('$CLIENT_GO', 'r') as f:
              lines = f.readlines()
          new_lines = []
          for line in lines:
              if 'if c.host != \"\" && c.host != destination.Fqdn {' in line:
                  indent = line[:len(line) - len(line.lstrip())]
                  new_lines.append(indent + 'if c.delHost {\n')
                  new_lines.append(indent + '\trequest.URL = &url.URL{Opaque: destination.String()}\n')
                  new_lines.append(indent + '\trequest.Host = \"\"\n')
                  new_lines.append(indent + '} else ')
              new_lines.append(line)
          with open('$CLIENT_GO', 'w') as f:
              f.writelines(new_lines)
          "
          echo "=== After patch ==="
          grep -n 'delHost\|DelHost\|Opaque' "$CLIENT_GO" || true

          # Verify Options struct has DelHost
          if ! grep -q 'DelHost.*bool' "$CLIENT_GO"; then
            echo "ERROR: DelHost field not found in client.go after patching!"
            exit 1
          fi
          echo "OK: DelHost field confirmed in client.go"

          echo "=== Patched Options struct ==="
          sed -n '/type Options struct/,/^}/p' "$CLIENT_GO"

          echo "=== Patched DialContext host check ==="
          grep -n -A5 'delHost' "$CLIENT_GO"

          # Add replace directive to go.mod
          echo "" >> go.mod
          echo "replace github.com/sagernet/sing => ../local-sing" >> go.mod
          echo "=== go.mod replace added ==="
          tail -3 go.mod

      - name: Add gomobile dependencies to module
        working-directory: upstream-sing-box
        run: |
          go get -tool github.com/sagernet/gomobile/cmd/gobind
          go get github.com/sagernet/gomobile
          echo "=== go.mod updated ==="

      - name: Build libbox.aar
        run: |
          cd upstream-sing-box
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_NDK_HOME

          echo "=== Building libbox.aar with gomobile ==="
          gomobile bind -v -androidapi 24 -javapkg=io.nekohasekai \
            -tags with_clash_api \
            -target android -libname=box \
            -trimpath -ldflags='-s -w -checklinkname=0' \
            -o ../app/libs/libbox.aar \
            ./experimental/libbox

          cd ..
          echo "=== libbox.aar built ==="
          ls -lh app/libs/libbox.aar

      - name: Verify libbox.aar exports
        run: |
          echo "Checking libbox.aar..."
          AAR="app/libs/libbox.aar"
          if [ ! -f "$AAR" ]; then
            echo "ERROR: libbox.aar not found!"
            exit 1
          fi
          SIZE=$(stat -c%s "$AAR")
          echo "libbox.aar size: $SIZE bytes ($(( SIZE / 1048576 )) MB)"
          if [ "$SIZE" -lt 5000000 ]; then
            echo "ERROR: libbox.aar too small (< 5MB), build likely failed"
            exit 1
          fi
          # Verify it's a valid ZIP/AAR and contains libbox.so
          if ! unzip -l "$AAR" | grep -q "libbox\.so"; then
            echo "ERROR: libbox.aar does not contain libbox.so"
            exit 1
          fi
          ABIS=$(unzip -l "$AAR" | grep -oP 'jni/\K[^/]+(?=/libbox\.so)' | sort)
          echo "Found ABIs: $ABIS"
          if [ -z "$ABIS" ]; then
            echo "ERROR: No ABI-specific libbox.so found"
            exit 1
          fi
          echo "OK: libbox.aar verified"

      - name: Upload libbox.aar artifact
        uses: actions/upload-artifact@v4
        with:
          name: libbox-aar
          path: app/libs/libbox.aar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize gradlew
        run: |
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew

      - name: Build Release APK (arm64-v8a)
        run: |
          mkdir -p dist
          ./gradlew assembleRelease -PabiOnly=arm64-v8a
          find app/build/outputs/apk/release -type f -name "*.apk" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kunbox-go-release-apk
          path: dist/*.apk
