name: Go Core Build (libbox.aar)

on:
  workflow_dispatch:
    inputs:
      sing_box_tag:
        description: 'sing-box upstream tag (e.g. v1.13.11)'
        required: false
        default: 'v1.13.11'

permissions:
  contents: write

jobs:
  build-libbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;29.0.13113456"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.13113456" >> $GITHUB_ENV

      - name: Install gomobile & gobind
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Clone sing-box upstream
        run: |
          TAG="${{ github.event.inputs.sing_box_tag || 'v1.13.11' }}"
          echo "Target sing-box tag: $TAG"
          git clone --branch "$TAG" --depth 1 \
            https://github.com/SagerNet/sing-box.git upstream-sing-box

      - name: Apply KunBox Go patches
        working-directory: upstream-sing-box
        run: |
          echo "=== Applying patch 01: option/simple.go ==="
          git apply --check ../patches/01-option-simple-go.patch && \
            git apply ../patches/01-option-simple-go.patch
          echo "=== Applying patch 02: protocol/http/outbound.go ==="
          git apply --check ../patches/02-outbound-go.patch && \
            git apply ../patches/02-outbound-go.patch
          echo "=== Patches 01 & 02 applied ==="

      - name: Patch sing library (client.go)
        working-directory: upstream-sing-box
        run: |
          # Find sing dependency path in go.sum / vendor
          # sing-box uses go mod, so we patch the module cache
          # First, resolve the sing module version
          SING_VERSION=$(grep 'github.com/sagernet/sing ' go.sum | head -1 | awk '{print $2}')
          echo "sing version: $SING_VERSION"

          # Download modules first
          go mod download

          SING_PATH="$(go env GOMODCACHE)/github.com/sagernet/sing@${SING_VERSION}/protocol/http/client.go"
          echo "Patching: $SING_PATH"

          if [ ! -f "$SING_PATH" ]; then
            echo "ERROR: sing client.go not found at $SING_PATH"
            echo "Searching..."
            find "$(go env GOMODCACHE)/github.com/sagernet" -name "client.go" -path "*/protocol/http/*" 2>/dev/null
            exit 1
          fi

          # 3a: Client struct - add delHost field
          sed -i '/host.*string/a\\tdelHost    bool' "$SING_PATH"

          # 3b: Options struct - add DelHost field
          sed -i '/Host.*string/a\\tDelHost  bool' "$SING_PATH"

          # 3c: NewClient - add delHost assignment
          sed -i '/host:.*options.Host,/a\\t\tdelHost:    options.DelHost,' "$SING_PATH"

          # 3d: DialContext - add delHost branch before existing host check
          sed -i 's/if c\.host != "" && c\.host != destination\.Fqdn {/if c.delHost {\n\t\trequest.URL = \&url.URL{Opaque: target}\n\t\trequest.Host = ""\n\t} else if c.host != "" \&\& c.host != destination.Fqdn {/' "$SING_PATH"

          echo "=== sing library patched ==="
          cat "$SING_PATH" | head -80

      - name: Build libbox.aar
        run: |
          cd upstream-sing-box
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_NDK_HOME

          echo "=== Building libbox.aar with gomobile ==="
          gomobile bind -v -androidapi 24 -javapkg=com.github.sagernet \
            -trimpath -ldflags='-s -w' \
            -o ../app/libs/libbox.aar \
            ./experimental/libbox

          cd ..
          echo "=== libbox.aar built ==="
          ls -lh app/libs/libbox.aar

      - name: Verify libbox.aar exports
        run: |
          echo "Checking exported symbols..."
          # Basic size check
          SIZE=$(stat -c%s app/libs/libbox.aar)
          echo "libbox.aar size: $SIZE bytes"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "WARNING: libbox.aar seems too small (< 10MB), build may have failed"
            exit 1
          fi
          echo "OK: libbox.aar looks reasonable"

      - name: Upload libbox.aar artifact
        uses: actions/upload-artifact@v4
        with:
          name: libbox-aar
          path: app/libs/libbox.aar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize gradlew
        run: |
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew

      - name: Build Debug APK (arm64-v8a)
        run: |
          mkdir -p dist
          ./gradlew assembleDebug -PabiOnly=arm64-v8a
          find app/build/outputs/apk/debug -type f -name "*.apk" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kunbox-go-debug-apk
          path: dist/*.apk
