name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore
            echo "KEYSTORE_PATH=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "No signing secrets found, generating temporary keystore..."
            keytool -genkeypair -v -keystore ${{ github.workspace }}/release.keystore \
              -alias release -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass temp123 -keypass temp123 \
              -dname "CN=KunBox, OU=Dev, O=KunBox, L=SH, ST=SH, C=CN"
            echo "KEYSTORE_PATH=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=temp123" >> $GITHUB_ENV
            echo "KEY_ALIAS=release" >> $GITHUB_ENV
            echo "KEY_PASSWORD=temp123" >> $GITHUB_ENV
          fi

      - name: Normalize gradlew
        run: |
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew

      - name: Build Release APK (arm64-v8a)
        run: |
          ./gradlew assembleRelease -PabiOnly=arm64-v8a

      - name: Build Release APK (armeabi-v7a)
        run: |
          ./gradlew assembleRelease -PabiOnly=armeabi-v7a

      - name: Collect APKs
        run: |
          mkdir -p dist
          find app/build/outputs/apk/release -type f -name "*.apk" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Read version from build config or generate one
            VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts 2>/dev/null || echo "build-$(date +%Y%m%d%H%M%S)")
            echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "KunBox ${{ steps.version.outputs.tag }}"
          body: |
            ## KunBox ${{ steps.version.outputs.tag }}
            
            ### Downloads
            - `arm64-v8a` - For most modern devices
            - `armeabi-v7a` - For older 32-bit devices
            
            ### Changes
            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: dist/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kunbox-release-apks
          path: dist/*.apk
