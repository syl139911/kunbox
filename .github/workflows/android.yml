name: Android Build

on:
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize and grant execute permission for gradlew
        run: |
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew

      - name: Build with Gradle
        run: |
          mkdir -p dist
          ./gradlew assembleDebug -PabiOnly=arm64-v8a
          find app/build/outputs/apk/debug -type f -name "*.apk" -exec cp {} dist/ \;
          rm -f app/build/outputs/apk/debug/*.apk
          ./gradlew assembleDebug -PabiOnly=armeabi-v7a
          find app/build/outputs/apk/debug -type f -name "*.apk" -exec cp {} dist/ \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-android-apk
          path: dist/*.apk
